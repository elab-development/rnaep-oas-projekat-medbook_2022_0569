name: CI/CD

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:

  test-user-service:
    name: Tests — user-service
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install -r user-service/requirements.txt pytest
      - name: Run tests
        run: pytest user-service/tests/ -v
        env:
          PYTHONPATH: user-service

  test-appointment-service:
    name: Tests — appointment-service
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install pytest
        run: pip install pytest
      - name: Run tests
        run: pytest appointment-service/tests/ -v

  test-medical-records-service:
    name: Tests — medical-records-service
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install -r medical-records-service/requirements.txt pytest
      - name: Run tests
        run: pytest medical-records-service/tests/ -v
        env:
          PYTHONPATH: medical-records-service

  build-frontend:
    name: Build — frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install
        working-directory: frontend
      - name: Build
        run: npm run build
        working-directory: frontend

  build-and-push-docker:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs:
      - test-user-service
      - test-appointment-service
      - test-medical-records-service
      - build-frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push user-service
        uses: docker/build-push-action@v5
        with:
          context: ./user-service
          push: ${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' }}
          tags: ghcr.io/${{ github.repository_owner }}/medbook-user-service:${{ github.sha }}

      - name: Build & push appointment-service
        uses: docker/build-push-action@v5
        with:
          context: ./appointment-service
          push: ${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' }}
          tags: ghcr.io/${{ github.repository_owner }}/medbook-appointment-service:${{ github.sha }}

      - name: Build & push medical-records-service
        uses: docker/build-push-action@v5
        with:
          context: ./medical-records-service
          push: ${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' }}
          tags: ghcr.io/${{ github.repository_owner }}/medbook-medical-records-service:${{ github.sha }}

      - name: Build & push api-gateway
        uses: docker/build-push-action@v5
        with:
          context: ./api-gateway
          push: ${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' }}
          tags: ghcr.io/${{ github.repository_owner }}/medbook-api-gateway:${{ github.sha }}

      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: ${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' }}
          tags: ghcr.io/${{ github.repository_owner }}/medbook-frontend:${{ github.sha }}
