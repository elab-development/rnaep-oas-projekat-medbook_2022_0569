services:
  postgres_user:
    image: postgres:16-alpine
    container_name: medbook-postgres-users
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5433:5432"
    volumes:
      - postgres_user_data:/var/lib/postgresql/data

  postgres_appointment:
    image: postgres:16-alpine
    container_name: medbook-postgres-appointment
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES1_DB}
    ports:
      - "5434:5432"
    volumes:
      - postgres_appointment_data:/var/lib/postgresql/data

  mongo_medicaldoc:
    image: mongo:7
    container_name: medbook-mongo-medicaldoc
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_DB}
    ports:
      - "27017:27017"
    volumes:
      - mongo_medicaldoc_data:/data/db

  kafka:
    image: apache/kafka:3.8.0
    container_name: medbook-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka_data:/var/lib/kafka/data


  user-service:
    build:
      context: ./user-service
      dockerfile: Dockerfile
    container_name: medbook-user-service
    ports:
      - "8001:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres_user:5432/${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      - postgres_user
      - kafka

  appointment-service:
    build:
      context: ./appointment-service
      dockerfile: Dockerfile
    container_name: medbook-appointment-service
    ports:
      - "8002:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres_appointment:5432/${POSTGRES1_DB}
      JWT_SECRET: ${JWT_SECRET}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      - postgres_appointment
      - kafka

  medical-records-service:
    build:
      context: ./medical-records-service
      dockerfile: Dockerfile
    container_name: medbook-medical-records-service
    ports:
      - "8003:8000"
    environment:
      DATABASE_URL: mongodb://${MONGO_USER}:${MONGO_PASSWORD}@mongo_medicaldoc:27017/${MONGO_DB}?authSource=admin
      JWT_SECRET: ${JWT_SECRET}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      - mongo_medicaldoc
      - kafka
  
  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: medbook-api-gateway
    ports:
      - "8000:8000"
    environment:
      USER_SERVICE_URL: http://user-service:8000
      APPOINTMENT_SERVICE_URL: http://appointment-service:8000
      MEDICAL_RECORDS_SERVICE_URL: http://medical-records-service:8000
    depends_on:
      - user-service
      - appointment-service
      - medical-records-service

  notification-service:
    build:
      context: ./notification-service
      dockerfile: Dockerfile
    container_name: medbook-notification-service
    ports:
      - "8004:8000"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      - kafka

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: medbook-frontend
    ports:
      - "3000:80"
    depends_on:
      - api-gateway

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: medbook-cadvisor
    ports:
      - "8081:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run/docker.sock:/var/run/docker.sock:rw
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    privileged: true
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: medbook-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/etc/prometheus/console_libraries"
      - "--web.console.templates=/etc/prometheus/consoles"
    depends_on:
      - user-service
      - appointment-service
      - medical-records-service
      - api-gateway
      - cadvisor
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: medbook-grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  postgres_user_data:
  postgres_appointment_data:
  mongo_medicaldoc_data:
  kafka_data:
  prometheus_data:
  grafana_data: